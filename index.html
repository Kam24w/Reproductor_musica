<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Melodify</title>
  <link rel="icon" href="public/logo.png" type="image/png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,700;9..144,800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- ══ SIDEBAR ══════════════════════════════════════════ -->
  <aside class="sidebar">

    <div class="sidebar-logo">
      <img src="public/logo.png" alt="Melodify" width="48" height="48"/>
      <span>Melodify</span>
    </div>

    <nav class="sidebar-nav">
      <a class="sidebar-nav-item active" id="home-nav" href="#">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span>Inicio</span>
      </a>
      <a class="sidebar-nav-item" id="itunes-search-link" href="#">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <span>Buscar</span>
      </a>
    </nav>

    <div class="sidebar-library">
      <div class="sidebar-library-header">
        <span>Tu Biblioteca</span>
        <button id="new-playlist-btn" class="lib-add-btn" title="Crear playlist">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
      </div>
      <div class="sidebar-new-pl-row">
        <input type="text" id="new-playlist-input" class="sidebar-pl-input" placeholder="Nueva playlist…" maxlength="40"/>
      </div>
      <ul id="sidebar-playlists" class="sidebar-pl-list"></ul>
    </div>

  </aside>

  <!-- ══ MAIN ═════════════════════════════════════════════ -->
  <main id="main" class="main"></main>

  <!-- ══ FOOTER ═══════════════════════════════════════════ -->
  <footer id="footer" class="footer"></footer>

  <!-- ══ MODAL ════════════════════════════════════════════ -->
  <div id="modal-overlay" class="modal-overlay"></div>
  <div id="modal" class="modal">
    <div class="modal-header">
      <h2>Agregar canción</h2>
      <button id="modal-cancel" class="modal-close-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label>Título <span class="req">*</span></label>
        <input type="text" id="modal-title" placeholder="Nombre de la canción" maxlength="100" autocomplete="off"/>
      </div>
      <div class="modal-field">
        <label>Artista <span class="req">*</span></label>
        <input type="text" id="modal-artist" placeholder="Nombre del artista" maxlength="80" autocomplete="off"/>
      </div>
      <div class="modal-row-2">
        <div class="modal-field">
          <label>Duración <small>mm:ss</small></label>
          <input type="text" id="modal-duration" placeholder="3:30" maxlength="6" autocomplete="off"/>
        </div>
        <div class="modal-field">
          <label>Posición <small>opcional</small></label>
          <input type="number" id="modal-position" placeholder="Al final" min="1" autocomplete="off"/>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn-cancel" id="modal-cancel-2">Cancelar</button>
      <button class="modal-btn-ok" id="modal-submit">Agregar</button>
    </div>
  </div>

  <!-- ══ TOAST ════════════════════════════════════════════ -->
  <div id="toast" class="toast"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
